name: check

on:
  pull_request:
    branches:
      - 'main'

permissions:
  contents: write

env:
  GOMAXPROCS: 4

jobs:
  build-go:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Init Go Environment
        uses: ./.github/actions/init_go

      - name: Build
        run: make build-go

  linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create local main branch
        run: git branch -f main origin/main

      - name: Init Go Environment
        uses: ./.github/actions/init_go

      - name: Linter
        # TODO: update the code so we can use linter-go instead of linter-go-new.
        run: make linter-go-new

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Init Go Environment
        uses: ./.github/actions/init_go
      - name: Run the unit tests
        run: make unit-tests
